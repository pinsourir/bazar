<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Arbre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="tree-container">
    <div class="tree-bg"></div>
        <div class="inner-layout">
            <div id="section-bruno" class="person-section left">...</div>
            <div id="section-alicia" class="person-section right">...</div>
            <div id="section-couple" class="person-section center">...</div>
        </div>
    </div>
    
    <div class="inner-layout">
        <div id="section-bruno" class="person-section left">
            <div class="label">Bruno</div>
            <div id="glowBruno" class="glow"></div>
            <div id="carousel-bruno" class="carousel-placeholder"></div>
        </div>

        <div id="section-alicia" class="person-section right">
            <div class="label">Alicia</div>
            <div id="glowAlicia" class="glow"></div>
            <div id="carousel-alicia" class="carousel-placeholder"></div>
        </div>

        <div id="section-couple" class="person-section center">
            <div id="nousTxt" class="label nous-label">Nous</div>
            <div id="glowCenter" class="glow"></div>
            <div id="ring" class="ring"></div>
            <div id="carousel-couple" class="carousel-placeholder"></div>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
