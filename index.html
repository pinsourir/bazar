<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
body {
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle, #1a120b, #000);
    font-family: 'Segoe Script', cursive;
}

.tree {
    position:absolute;
    width:100%;
    height:100%;
    background:url("arbre.png") center/contain no-repeat;
}

/* glow */
.glow {
    position:absolute;
    width:260px;
    height:260px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,215,0,0.9), transparent);
    opacity:0;
    filter: blur(35px);
    transition: opacity 2s;
}

/* carrousel */
.carousel {
    position:absolute;
    width:150px;
    height:150px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 40px gold;
    opacity:0;
    transform:scale(0.5);
    transition:2s;
}

.carousel.show { opacity:1; transform:scale(1); }
.carousel.hide { opacity:0; transform:scale(0.5); }

.carousel img {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1.5s;
}

.carousel img.active { opacity:1; }

/* textes */
.label {
    position:absolute;
    color:#ffd700;
    font-size:34px;
    text-shadow:0 0 12px gold;
    border-bottom:2px solid gold;
    padding-bottom:6px;
}

/* anneau */
.ring {
    position:absolute;
    width:140px;
    height:140px;
    border:4px solid gold;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    box-shadow:0 0 30px gold;
    opacity:0;
    animation:spin 10s linear infinite;
}

@keyframes spin {
    from { transform:translate(-50%, -50%) rotate(0deg); }
    to { transform:translate(-50%, -50%) rotate(360deg); }
}

/* particules */
.particle {
    position:absolute;
    width:4px;
    height:4px;
    background:gold;
    border-radius:50%;
    animation:float 8s linear infinite;
}

@keyframes float {
    from { transform: translateY(80vh); }
    to { transform: translateY(10vh); opacity:0; }
}
</style>
</head>

<body>

<div class="tree"></div>

<!-- glow -->
<div id="glowBruno" class="glow" style="left:22%; top:35%;"></div>
<div id="glowAlicia" class="glow" style="right:22%; top:35%;"></div>
<div id="glowCenter" class="glow" style="left:50%; top:50%; transform:translateX(-50%);"></div>

<!-- textes -->
<div class="label" style="left:18%; top:12%;">Bruno</div>
<div class="label" style="right:18%; top:12%;">Alicia</div>
<div id="nousTxt" class="label" style="left:50%; top:42%; transform:translateX(-50%); opacity:0;">Nous</div>

<!-- anneau -->
<div id="ring" class="ring"></div>

<script>

// 📸 photos (mets 5 / 5 / 10)
const bruno = ["b1.jpg","b2.jpg","b3.jpg","b4.jpg","b5.jpg"];
const alicia = ["a1.jpg","a2.jpg","a3.jpg","a4.jpg","a5.jpg"];
const couple = ["c1.jpg","c2.jpg","c3.jpg","c4.jpg","c5.jpg","c6.jpg","c7.jpg","c8.jpg","c9.jpg","c10.jpg"];

// 🎞️ carrousel lent
function createCarousel(x,y,photos){
    let div=document.createElement("div");
    div.className="carousel";
    div.style.left=x+"px";
    div.style.top=y+"px";

    photos.forEach((p,i)=>{
        let img=document.createElement("img");
        img.src=p;
        if(i===0) img.classList.add("active");
        div.appendChild(img);
    });

    document.body.appendChild(div);

    setTimeout(()=>div.classList.add("show"),100);

    let i=0;
    let interval = setInterval(()=>{
        let imgs=div.querySelectorAll("img");
        imgs[i].classList.remove("active");
        i=(i+1)%imgs.length;
        imgs[i].classList.add("active");
    },3000); // 🔥 ralenti ici

    return {div, interval, duration: photos.length * 3000};
}

// particules
setInterval(()=>{
    let p=document.createElement("div");
    p.className="particle";
    p.style.left = (window.innerWidth*0.3 + Math.random()*window.innerWidth*0.4) + "px";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),8000);
},200);

// 🎬 TIMELINE INTELLIGENTE

// Bruno
setTimeout(()=>{
    glowBruno.style.opacity=1;
    let c = createCarousel(window.innerWidth*0.22, window.innerHeight*0.38, bruno);

    setTimeout(()=>{
        glowBruno.style.opacity=0;
        c.div.classList.add("hide");
        clearInterval(c.interval);
    }, c.duration);

},2000);

// Alicia
setTimeout(()=>{
    glowAlicia.style.opacity=1;
    let c = createCarousel(window.innerWidth*0.68, window.innerHeight*0.38, alicia);

    setTimeout(()=>{
        glowAlicia.style.opacity=0;
        c.div.classList.add("hide");
        clearInterval(c.interval);
    }, c.duration);

}, 2000 + (bruno.length * 3000) + 2000);

// ❤️ couple
setTimeout(()=>{
    glowCenter.style.opacity=1;
    nousTxt.style.opacity=1;
    ring.style.opacity=1;

    createCarousel(
        window.innerWidth/2 - 75,
        window.innerHeight/2 - 75,
        couple
    );

}, 2000 + (bruno.length * 3000) + (alicia.length * 3000) + 4000);

</script>

</body>
</html>
