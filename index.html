<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Arbre Féérique Mariage</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #1a120b, #000);
    overflow: hidden;
}

/* 🌳 IMAGE ARBRE */
.tree-container {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("arbre.png") center/contain no-repeat;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
}

/* ✨ Zones lumineuses */
.glow-zone {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: 2s;
    background: radial-gradient(circle, rgba(255,215,0,0.8), transparent);
}

/* 📸 Carrousel */
.carousel {
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 25px gold;
    opacity: 0;
    transform: scale(0.6);
    transition: 1.5s;
}

.carousel.show {
    opacity: 1;
    transform: scale(1);
}

.carousel img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: 1s;
}

.carousel img.active {
    opacity: 1;
}

/* 🌟 Particules */
.particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: gold;
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity:1; }
    to { transform: translateY(-10vh); opacity:0; }
}
</style>
</head>

<body>

<div class="tree-container"></div>

<!-- Zones lumineuses -->
<div id="glowBruno" class="glow-zone" style="left:25%; top:40%; width:300px; height:300px;"></div>
<div id="glowAlicia" class="glow-zone" style="right:25%; top:40%; width:300px; height:300px;"></div>
<div id="glowCenter" class="glow-zone" style="left:50%; top:55%; width:350px; height:350px; transform:translateX(-50%);"></div>

<script>
// 📸 PHOTOS
const brunoPhotos = ["b1.jpg","b2.jpg","b3.jpg"];
const aliciaPhotos = ["a1.jpg","a2.jpg","a3.jpg"];
const couplePhotos = ["c1.jpg","c2.jpg","c3.jpg"];

// 🎞️ Carrousel
function createCarousel(x, y, photos) {
    const div = document.createElement("div");
    div.className = "carousel";
    div.style.left = x + "px";
    div.style.top = y + "px";

    photos.forEach((src, i) => {
        const img = document.createElement("img");
        img.src = src;
        if(i === 0) img.classList.add("active");
        div.appendChild(img);
    });

    document.body.appendChild(div);

    setTimeout(() => div.classList.add("show"), 100);

    let index = 0;
    setInterval(() => {
        const imgs = div.querySelectorAll("img");
        imgs[index].classList.remove("active");
        index = (index + 1) % imgs.length;
        imgs[index].classList.add("active");
    }, 2500);
}

// ✨ Particules
setInterval(() => {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 6000);
}, 150);

// 🎬 TIMELINE

// Bruno
setTimeout(() => {
    document.getElementById("glowBruno").style.opacity = 1;
    createCarousel(window.innerWidth*0.25, window.innerHeight*0.4, brunoPhotos);
}, 2000);

// Alicia
setTimeout(() => {
    document.getElementById("glowAlicia").style.opacity = 1;
    createCarousel(window.innerWidth*0.65, window.innerHeight*0.4, aliciaPhotos);
}, 6000);

// Couple (tronc)
setTimeout(() => {
    document.getElementById("glowCenter").style.opacity = 1;
    createCarousel(window.innerWidth*0.45, window.innerHeight*0.6, couplePhotos);
}, 10000);

</script>

</body>
</html>
