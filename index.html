<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
body {
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle, #1a120b, #000);
}

/* 🌳 arbre */
.tree {
    position:absolute;
    width:100%;
    height:100%;
    background:url("arbre.png") center/contain no-repeat;
}

/* ✨ lumières */
.glow {
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,215,0,0.9), transparent);
    opacity:0;
    filter: blur(25px);
    transition:2s;
}

/* 📸 carrousel */
.carousel {
    position:absolute;
    width:130px;
    height:130px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 30px gold;
    opacity:0;
    transform:scale(0.5);
    transition:1.2s;
}

.carousel.show {
    opacity:1;
    transform:scale(1);
}

.carousel img {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
}

.carousel img.active {
    opacity:1;
}

/* 🌟 particules */
.particle {
    position:absolute;
    width:4px;
    height:4px;
    background:gold;
    border-radius:50%;
    animation:float 7s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity:1; }
    to { transform: translateY(-10vh); opacity:0; }
}

/* 💫 pulse cœur */
.heart-glow {
    position:absolute;
    width:200px;
    height:200px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,200,200,0.8), transparent);
    top:48%;
    left:50%;
    transform:translate(-50%, -50%);
    opacity:0;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0% { transform:translate(-50%, -50%) scale(1); opacity:0.6;}
    50% { transform:translate(-50%, -50%) scale(1.3); opacity:1;}
    100% { transform:translate(-50%, -50%) scale(1); opacity:0.6;}
}
</style>
</head>

<body>

<div class="tree"></div>

<!-- ✨ zones -->
<div id="brunoGlow" class="glow" style="left:20%; top:35%;"></div>
<div id="aliciaGlow" class="glow" style="right:20%; top:35%;"></div>
<div id="centerGlow" class="glow" style="left:50%; top:60%; transform:translateX(-50%);"></div>
<div id="heart" class="heart-glow"></div>

<script>

// 📸 TES PHOTOS
const bruno = ["b1.jpg","b2.jpg","b3.jpg"];
const alicia = ["a1.jpg","a2.jpg","a3.jpg"];
const couple = ["c1.jpg","c2.jpg","c3.jpg"];

// 🎞️ carrousel
function createCarousel(x,y,photos){
    let div=document.createElement("div");
    div.className="carousel";
    div.style.left=x+"px";
    div.style.top=y+"px";

    photos.forEach((p,i)=>{
        let img=document.createElement("img");
        img.src=p;
        if(i===0) img.classList.add("active");
        div.appendChild(img);
    });

    document.body.appendChild(div);

    setTimeout(()=>div.classList.add("show"),100);

    let i=0;
    setInterval(()=>{
        let imgs=div.querySelectorAll("img");
        imgs[i].classList.remove("active");
        i=(i+1)%imgs.length;
        imgs[i].classList.add("active");
    },2000);
}

// 🌟 particules
setInterval(()=>{
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),7000);
},150);

// 🎬 TIMELINE CINÉMA

// Bruno
setTimeout(()=>{
    brunoGlow.style.opacity=1;
    createCarousel(window.innerWidth*0.22, window.innerHeight*0.38, bruno);
},2000);

// Alicia
setTimeout(()=>{
    aliciaGlow.style.opacity=1;
    createCarousel(window.innerWidth*0.68, window.innerHeight*0.38, alicia);
},6000);

// Fusion cœur ❤️
setTimeout(()=>{
    heart.style.opacity=1;
    centerGlow.style.opacity=1;
    createCarousel(window.innerWidth*0.45, window.innerHeight*0.58, couple);
},10000);

</script>

</body>
</html>
