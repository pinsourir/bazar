<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre Mariage</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fdf6f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}.envelope { position: relative; width: 300px; height: 200px; background: #f5e1da; border-radius: 5px; cursor: pointer; }

.flap { position: absolute; width: 0; height: 0; border-left: 150px solid transparent; border-right: 150px solid transparent; border-bottom: 100px solid #e8cfc4; top: -100px; left: 0; transform-origin: bottom; transition: transform 0.6s ease; }

.letter { position: absolute; width: 260px; height: 160px; background: white; top: 20px; left: 20px; border-radius: 5px; display: flex; justify-content: center; align-items: center; text-align: center; transform: translateY(0); transition: transform 0.6s ease; }

.open .flap { transform: rotateX(180deg); }

.open .letter { transform: translateY(-120px); }

.hidden-content { display: none; text-align: center; }

.open + .hidden-content { display: block; }

h1 { color: #c97b63; } </style>

</head>
<body><div id="envelope" class="envelope">
  <div class="flap"></div>
  <div class="letter">
    Cliquez pour ouvrir 💌
  </div>
</div><div class="hidden-content">
  <h1>Vous êtes invités à notre mariage 💍</h1>
  <p>Le 12 Juin 2027</p>
  <p>Paris</p>
</div><script>
const envelope = document.getElementById('envelope');

envelope.addEventListener('click', () => {
  envelope.classList.toggle('open');
});
</script></body>
</html>
