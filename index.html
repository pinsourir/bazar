<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Arbre Magique</title>

<style>
body {
    margin:0;
    background:#0b0b0b;
    overflow:hidden;
    font-family: 'Arial';
    color:white;
}

svg {
    width:100vw;
    height:100vh;
}

.branch {
    fill:none;
    stroke:gold;
    stroke-width:3;
    stroke-dasharray:1000;
    stroke-dashoffset:1000;
    filter: drop-shadow(0 0 6px gold);
    transition: stroke-dashoffset 4s ease;
}

.draw {
    stroke-dashoffset:0;
}

.name {
    fill:white;
    font-size:24px;
    opacity:0;
    transition:2s;
}

.show {
    opacity:1;
}

.photo {
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transform:scale(0.5);
    transition:1s;
    box-shadow:0 0 10px gold;
}

.photo.show {
    opacity:1;
    transform:scale(1);
}

.center-text {
    position:absolute;
    top:45%;
    width:100%;
    text-align:center;
    font-size:40px;
    opacity:0;
    transition:2s;
}
</style>
</head>

<body>

<svg viewBox="0 0 1000 600">

    <!-- Branche Bruno -->
    <path id="branchLeft" class="branch"
          d="M500 550 Q350 400 250 200" />

    <!-- Branche Alicia -->
    <path id="branchRight" class="branch"
          d="M500 550 Q650 400 750 200" />

    <!-- Texte -->
    <text id="brunoText" class="name" x="250" y="200">Bruno</text>
    <text id="aliciaText" class="name" x="750" y="200">Alicia</text>

</svg>

<div id="centerText" class="center-text">NOUS</div>

<script>

const brunoPhotos = ["photo1.jpg","photo2.jpg","photo3.jpg"];
const aliciaPhotos = ["photo4.jpg","photo5.jpg","photo6.jpg"];

function placePhotos(photos, startX, startY, direction) {
    photos.forEach((p,i)=>{
        setTimeout(()=>{
            let div = document.createElement("div");
            div.className="photo";
            div.style.backgroundImage=`url(${p})`;

            let x = startX + (direction * i * 80);
            let y = startY - (i * 80);

            div.style.left = x+"px";
            div.style.top = y+"px";

            document.body.appendChild(div);

            setTimeout(()=>div.classList.add("show"),100);
        }, i*1200);
    });
}

// Animation

// 1️⃣ Bruno
setTimeout(()=>{
    document.getElementById("branchLeft").classList.add("draw");
},1000);

setTimeout(()=>{
    document.getElementById("brunoText").classList.add("show");
    placePhotos(brunoPhotos, 250, 400, -1);
},4000);

// 2️⃣ Alicia
setTimeout(()=>{
    document.getElementById("branchRight").classList.add("draw");
},7000);

setTimeout(()=>{
    document.getElementById("aliciaText").classList.add("show");
    placePhotos(aliciaPhotos, 650, 400, 1);
},10000);

// 3️⃣ Fusion
setTimeout(()=>{
    document.getElementById("centerText").style.opacity=1;
},14000);

</script>

</body>
</html>
