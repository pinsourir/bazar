<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Arbre Généalogique Mariage</title>
<style>
    body {
        margin: 0;
        background: #0b0b0b;
        overflow: hidden;
        font-family: Arial;
        color: white;
    }

    .tree {
        position: relative;
        width: 100vw;
        height: 100vh;
    }

    .branch {
        position: absolute;
        width: 4px;
        background: linear-gradient(to top, transparent, gold);
        transform-origin: bottom;
        opacity: 0;
        transition: all 2s ease;
    }

    .left {
        bottom: 0;
        left: 30%;
        height: 0;
        transform: rotate(-30deg);
    }

    .right {
        bottom: 0;
        right: 30%;
        height: 0;
        transform: rotate(30deg);
    }

    .grow {
        height: 60%;
        opacity: 1;
    }

    .photo {
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background-size: cover;
        background-position: center;
        opacity: 0;
        transform: scale(0.5);
        transition: all 1s ease;
        box-shadow: 0 0 10px gold;
    }

    .show {
        opacity: 1;
        transform: scale(1);
    }

    .center-branch {
        position: absolute;
        bottom: 40%;
        left: 50%;
        width: 4px;
        height: 0;
        background: gold;
        opacity: 0;
        transition: 2s;
    }

    .final {
        height: 30%;
        opacity: 1;
    }

    .title {
        position: absolute;
        top: 20%;
        width: 100%;
        text-align: center;
        font-size: 2em;
        opacity: 0;
        transition: 2s;
    }

    .title.show {
        opacity: 1;
    }
</style>
</head>

<body>

<div class="tree">
    <div class="branch left" id="bruno"></div>
    <div class="branch right" id="alicia"></div>
    <div class="center-branch" id="fusion"></div>

    <div class="title" id="title">Bruno ❤️ Alicia</div>
</div>

<script>
const brunoPhotos = [
    "photo1.jpg",
    "photo2.jpg",
    "photo3.jpg"
];

const aliciaPhotos = [
    "photo4.jpg",
    "photo5.jpg",
    "photo6.jpg"
];

function createPhoto(src, x, y) {
    const div = document.createElement("div");
    div.className = "photo";
    div.style.backgroundImage = `url(${src})`;
    div.style.left = x + "px";
    div.style.top = y + "px";
    document.body.appendChild(div);

    setTimeout(() => div.classList.add("show"), 100);
}

function animateBranch(branchId, photos, side) {
    const branch = document.getElementById(branchId);
    branch.classList.add("grow");

    photos.forEach((photo, i) => {
        setTimeout(() => {
            let x = side === "left" ? 300 - (i * 60) : window.innerWidth - 300 + (i * 60);
            let y = window.innerHeight - (200 + i * 100);

            createPhoto(photo, x, y);
        }, i * 1500);
    });
}

// Animation timeline
setTimeout(() => {
    animateBranch("bruno", brunoPhotos, "left");
}, 1000);

setTimeout(() => {
    animateBranch("alicia", aliciaPhotos, "right");
}, 6000);

setTimeout(() => {
    document.getElementById("fusion").classList.add("final");
}, 11000);

setTimeout(() => {
    document.getElementById("title").classList.add("show");
}, 13000);
</script>

</body>
</html>
