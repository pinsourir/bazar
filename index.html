<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
body {
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle, #1a120b, #000);
}

/* 🌳 arbre visible */
.tree {
    position:absolute;
    width:100%;
    height:100%;
    background-image: url("arbre.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    z-index:1;
}

/* ✨ glow */
.glow {
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,215,0,0.9), transparent);
    opacity:0;
    filter: blur(30px);
    transition: opacity 2s ease;
}

/* 📸 carrousel */
.carousel {
    position:absolute;
    width:130px;
    height:130px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 30px gold;
    opacity:0;
    transform:scale(0.6);
    transition:1.5s;
    z-index:2;
}

.carousel.show {
    opacity:1;
    transform:scale(1);
}

.carousel.hide {
    opacity:0;
    transform:scale(0.5);
}

.carousel img {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
}

.carousel img.active {
    opacity:1;
}

/* 🌟 particules */
.particle {
    position:absolute;
    width:4px;
    height:4px;
    background:gold;
    border-radius:50%;
    animation:float 7s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity:1; }
    to { transform: translateY(-10vh); opacity:0; }
}

/* ❤️ cœur */
.heart {
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,150,150,0.9), transparent);
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    opacity:0;
    transition:2s;
}
</style>
</head>

<body>

<div class="tree"></div>

<div id="glowBruno" class="glow" style="left:22%; top:35%;"></div>
<div id="glowAlicia" class="glow" style="right:22%; top:35%;"></div>
<div id="glowCenter" class="glow" style="left:50%; top:60%; transform:translateX(-50%);"></div>

<div id="heart" class="heart"></div>

<script>

// 📸 photos
const bruno = ["b1.jpg","b2.jpg","b3.jpg"];
const alicia = ["a1.jpg","a2.jpg","a3.jpg"];
const couple = ["c1.jpg","c2.jpg","c3.jpg"];

// 🎞️ carrousel
function createCarousel(x,y,photos){
    let div=document.createElement("div");
    div.className="carousel";
    div.style.left=x+"px";
    div.style.top=y+"px";

    photos.forEach((p,i)=>{
        let img=document.createElement("img");
        img.src=p;
        if(i===0) img.classList.add("active");
        div.appendChild(img);
    });

    document.body.appendChild(div);

    setTimeout(()=>div.classList.add("show"),100);

    let i=0;
    let interval = setInterval(()=>{
        let imgs=div.querySelectorAll("img");
        imgs[i].classList.remove("active");
        i=(i+1)%imgs.length;
        imgs[i].classList.add("active");
    },2000);

    return {div, interval};
}

// 🌟 particules
setInterval(()=>{
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),7000);
},150);

// 🎬 TIMELINE

// Bruno
setTimeout(()=>{
    glowBruno.style.opacity=1;
    let c = createCarousel(window.innerWidth*0.22, window.innerHeight*0.38, bruno);

    // extinction
    setTimeout(()=>{
        glowBruno.style.opacity=0;
        c.div.classList.add("hide");
        clearInterval(c.interval);
    },4000);

},2000);

// Alicia
setTimeout(()=>{
    glowAlicia.style.opacity=1;
    let c = createCarousel(window.innerWidth*0.68, window.innerHeight*0.38, alicia);

    setTimeout(()=>{
        glowAlicia.style.opacity=0;
        c.div.classList.add("hide");
        clearInterval(c.interval);
    },4000);

},7000);

// Couple ❤️
setTimeout(()=>{
    glowCenter.style.opacity=1;
    heart.style.opacity=1;
    createCarousel(window.innerWidth*0.45, window.innerHeight*0.6, couple);
},12000);

</script>

</body>
</html>
