<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
body {
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle, #1a120b, #000);
}

/* 🌳 arbre */
.tree {
    position:absolute;
    width:100%;
    height:100%;
    background:url("arbre.png") center/contain no-repeat;
}

/* ✨ glow */
.glow {
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,215,0,0.9), transparent);
    opacity:0;
    filter: blur(30px);
    transition: opacity 2s;
}

/* 📸 carrousel */
.carousel {
    position:absolute;
    width:130px;
    height:130px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 30px gold;
    opacity:0;
    transform:scale(0.6);
    transition:1.5s;
}

.carousel.show { opacity:1; transform:scale(1); }
.carousel.hide { opacity:0; transform:scale(0.5); }

.carousel img {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
}
.carousel img.active { opacity:1; }

/* 📝 textes */
.label {
    position:absolute;
    color:gold;
    font-size:28px;
    font-family:cursive;
    opacity:0;
    transition:2s;
    text-shadow:0 0 10px gold;
}

/* 💍 anneau */
.ring {
    position:absolute;
    width:100px;
    height:100px;
    border:4px solid gold;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    box-shadow:0 0 20px gold;
    opacity:0;
    animation:spin 6s linear infinite;
}

@keyframes spin {
    from { transform:translate(-50%, -50%) rotate(0deg); }
    to { transform:translate(-50%, -50%) rotate(360deg); }
}

/* 🌟 particules limitées à l’arbre */
.particle {
    position:absolute;
    width:4px;
    height:4px;
    background:gold;
    border-radius:50%;
    animation:float 7s linear infinite;
}

@keyframes float {
    from { transform: translateY(80vh); opacity:1; }
    to { transform: translateY(10vh); opacity:0; }
}
</style>
</head>

<body>

<div class="tree"></div>

<div id="glowBruno" class="glow" style="left:22%; top:35%;"></div>
<div id="glowAlicia" class="glow" style="right:22%; top:35%;"></div>
<div id="glowCenter" class="glow" style="left:50%; top:60%; transform:translateX(-50%);"></div>

<!-- 📝 textes -->
<div id="brunoTxt" class="label" style="left:20%; top:30%;">Bruno</div>
<div id="aliciaTxt" class="label" style="right:20%; top:30%;">Alicia</div>
<div id="nousTxt" class="label" style="left:50%; top:48%; transform:translateX(-50%);">Nous</div>

<!-- 💍 anneau -->
<div id="ring" class="ring"></div>

<script>

// 📸 photos
const bruno = ["b1.jpg","b2.jpg","b3.jpg"];
const alicia = ["a1.jpg","a2.jpg","a3.jpg"];
const couple = ["c1.jpg","c2.jpg","c3.jpg"];

// 🎞️ carrousel
function createCarousel(x,y,photos){
    let div=document.createElement("div");
    div.className="carousel";
    div.style.left=x+"px";
    div.style.top=y+"px";

    photos.forEach((p,i)=>{
        let img=document.createElement("img");
        img.src=p;
        if(i===0) img.classList.add("active");
        div.appendChild(img);
    });

    document.body.appendChild(div);

    setTimeout(()=>div.classList.add("show"),100);

    let i=0;
    let interval = setInterval(()=>{
        let imgs=div.querySelectorAll("img");
        imgs[i].classList.remove("active");
        i=(i+1)%imgs.length;
        imgs[i].classList.add("active");
    },2000);

    return {div, interval};
}

// 🌟 particules limitées zone arbre
setInterval(()=>{
    let p=document.createElement("div");
    p.className="particle";

    // zone centrée (évite les bords)
    p.style.left = (window.innerWidth*0.3 + Math.random()*window.innerWidth*0.4) + "px";

    document.body.appendChild(p);
    setTimeout(()=>p.remove(),7000);
},150);

// 🎬 TIMELINE

// Bruno
setTimeout(()=>{
    glowBruno.style.opacity=1;
    brunoTxt.style.opacity=1;

    let c = createCarousel(window.innerWidth*0.22, window.innerHeight*0.38, bruno);

    setTimeout(()=>{
        glowBruno.style.opacity=0;
        brunoTxt.style.opacity=0;
        c.div.classList.add("hide");
        clearInterval(c.interval);
    },4000);

},2000);

// Alicia
setTimeout(()=>{
    glowAlicia.style.opacity=1;
    aliciaTxt.style.opacity=1;

    let c = createCarousel(window.innerWidth*0.68, window.innerHeight*0.38, alicia);

    setTimeout(()=>{
        glowAlicia.style.opacity=0;
        aliciaTxt.style.opacity=0;
        c.div.classList.add("hide");
        clearInterval(c.interval);
    },4000);

},7000);

// ❤️ couple
setTimeout(()=>{
    glowCenter.style.opacity=1;
    nousTxt.style.opacity=1;
    ring.style.opacity=1;

    createCarousel(window.innerWidth*0.45, window.innerHeight*0.6, couple);
},12000);

</script>

</body>
</html>
